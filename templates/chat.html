<!DOCTYPE html>

<html lang="en">
<head>
    <title>Chatbot</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


<!-- Bootstrap 4 -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<!-- Custom CSS -->
<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">

<!-- jQuery FIRST before anything else -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<!-- Bootstrap JS -->
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>


</head>
<body>

<div class="chat-card">


<!-- Header -->
<div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="bot-info">
        <h5>Sahana's Medical Assistant</h5>
        <small><span class="status-dot"></span>Online</small>
    </div>
    <div class="header-actions">
        <a href="#" title="Search"><i class="fas fa-search"></i></a>
        <a href="#" title="Info"><i class="fas fa-info-circle"></i></a>
        <a href="#" title="More"><i class="fas fa-ellipsis-v"></i></a>
    </div>
</div>

<!-- Messages -->
<div class="chat-messages" id="chat-messages">

    <div class="welcome-msg">
        <span>Today</span>
    </div>

    <!-- Bot welcome bubble -->
    <div class="message-row bot">
        <div class="msg-avatar bot"><i class="fas fa-robot"></i></div>
        <div>
            <div class="bubble bot">
                👋 Hi there! I'm your AI assistant. How can I help you today?
            </div>
            <div class="msg-time" id="welcome-time"></div>
        </div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typing-indicator">
        <div class="msg-avatar bot"><i class="fas fa-robot"></i></div>
        <div class="typing-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

</div>

<!-- Input -->
<div class="chat-input-area">
    <input
        type="text"
        id="user-input"
        placeholder="Type a message…"
        autocomplete="off"
    />
    <button class="send-btn" id="send-btn" title="Send">
        <i class="fas fa-paper-plane"></i>
    </button>
</div>


</div>

<script>
    $(document).ready(function() {

        // Set welcome time
        document.getElementById('welcome-time').textContent = getTime();

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function scrollBottom() {
            var box = document.getElementById('chat-messages');
            box.scrollTop = box.scrollHeight;
        }

        function appendMessage(text, sender) {
            var isUser = sender === 'user';
            var row = document.createElement('div');
            row.className = 'message-row ' + sender;

            var avatarIcon = isUser ? 'fa-user' : 'fa-robot';
            var bubbleClass = isUser ? 'user' : 'bot';

            row.innerHTML =
                '<div class="msg-avatar ' + sender + '"><i class="fas ' + avatarIcon + '"></i></div>' +
                '<div>' +
                    '<div class="bubble ' + bubbleClass + '">' + text + '</div>' +
                    '<div class="msg-time">' + getTime() + '</div>' +
                '</div>';

            var indicator = document.getElementById('typing-indicator');
            document.getElementById('chat-messages').insertBefore(row, indicator);
            scrollBottom();
        }

        function showTyping(show) {
            var el = document.getElementById('typing-indicator');
            if (show) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
            scrollBottom();
        }

        function sendMessage() {
            var input = document.getElementById('user-input');
            var text  = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            input.value = '';
            showTyping(true);

            $.ajax({
                type: 'POST',
                url:  '/get',
                data: { msg: text },
                success: function(response) {
                    showTyping(false);
                    appendMessage(response, 'bot');
                },
                error: function(xhr, status, error) {
                    showTyping(false);
                    console.log('Error:', xhr.responseText);
                    appendMessage('Sorry, something went wrong. Please try again.', 'bot');
                }
            });
        }

        // Button click
        $('#send-btn').on('click', function() {
            sendMessage();
        });

        // Enter key
        $('#user-input').on('keypress', function(e) {
            if (e.which === 13) {
                sendMessage();
            }
        });

        scrollBottom();

    });
</script>

</body>
</html>
